version: '3.8'
services:
  db:
    image: postgres:15
    container_name: gestao_funcionarios_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: gestao_funcionarios
    ports:
      - "5432:5432"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql