spring.application.name=backend
# Coordenadas do Banco de Dados PostgreSQL no Docker
spring.datasource.url=jdbc:postgresql://localhost:5432/gestao_funcionarios
spring.datasource.username=admin
spring.datasource.password=adminpassword
spring.datasource.driver-class-name=org.postgresql.Driver

# Configurações do Hibernate (JPA)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
# show-sql imprime direto no console, por fora do logger (sem formato/estrutura).
# Trocado pelas duas linhas abaixo, que passam pelo SLF4J e saem estruturadas também.
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ---------------------------------------------------------------------------
# Log estruturado (nativo do Spring Boot desde a 3.4, sem dependência extra)
# Formato Elastic Common Schema (JSON) no console.
# Outras opções válidas: logstash, gelf
# ---------------------------------------------------------------------------
logging.structured.format.console=ecs
logging.structured.ecs.service.name=${spring.application.name}
logging.structured.ecs.service.version=0.0.1
logging.structured.ecs.service.environment=local